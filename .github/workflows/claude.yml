name: Claude Code agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: ${{ (contains(github.event.issue.labels.*.name, 'claude-opus') || contains(github.event.pull_request.labels.*.name, 'claude-opus')) && '--model claude-opus-4-6' || '--model claude-sonnet-4-6' }}